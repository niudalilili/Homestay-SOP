server:
  port: 8080
spring:
  application:
    name: homestay-service
  main:
    allow-circular-references: true
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${ty.db.host}:3306/nature_education_activity?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${ty.db.pw}
  data:
    redis:
      host: ${ty.redis.host}
      port: ${ty.redis.port}
      database: ${ty.redis.database}
      password: ${ty.redis.pw}
      lettuce:
        pool:
          max-active: 200
          max-wait: -1ms
          max-idle: 10
          min-idle: 0
ty:
  alioss:
    endpoint: ${ty.alioss.endpoint}
    access-key-id: ${ty.alioss.access-key-id}
    access-key-secret: ${ty.alioss.access-key-secret}
    bucket-name: ${ty.alioss.bucket-name}

logging:
  level:
    com:
      tanyde:
        mapper: debug
        service: info
        controller: info

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.tanyde.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

wx:
  appid: ${wx.appid:}
  secret: ${wx.secret:}

############## Sa-Token 配置 (文档: https://sa-token.cc) ##############
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: satoken
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true

knife4j:
  enable: false
  setting:
    language: zh_cn
